name: password-expiry-report
description: List users with their password dates to identify upcoming expirations
author: JumpCloud
version: "1.0"
tags: [security, passwords, audit, compliance]

parameters: []

steps:
  - name: list-password-dates
    command: 'users list --fields username,email,password_date,password_expiration_date,password_never_expires -t'

on_success:
  message: "Password expiry report complete. Review password_expiration_date for upcoming expirations."

on_failure:
  message: "Password expiry report failed at step: {{ .failed_step }}"
