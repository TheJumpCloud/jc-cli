    visionOS:
      introduced: n/a
    watchOS:
      deprecated: '26.4'
  type: <boolean>
  presence: optional
  default: true
  content: If `false`, the system disables Siri when the device is locked. The system
    ignores this restriction if the device doesn't have a passcode set.
- key: allowAutoCorrection
