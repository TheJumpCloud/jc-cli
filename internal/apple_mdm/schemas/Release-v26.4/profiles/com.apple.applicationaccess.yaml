    tvOS:
      introduced: n/a
    visionOS:
      introduced: n/a
    watchOS:
      introduced: n/a
  type: <boolean>
  presence: optional
  default: true
  content: If `false`, the system disables keyboard autocorrection.
- key: allowAutoDim
  title: Allow Auto Dim
  supportedOS:
    iOS:
