    macOS:
      introduced: n/a
    tvOS:
      introduced: n/a
    visionOS:
      introduced: n/a
    watchOS:
      deprecated: '26.4'
      supervised: true
  type: <boolean>
  presence: optional
  default: true
  content: If `false`, the system prevents Siri from querying user-generated content
