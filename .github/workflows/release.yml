name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write       # gh release create (creates tag + release)
  pull-requests: read   # read merge labels

# Serialize release runs so two PRs merging back-to-back don't both
# compute the same next version and race on `gh release create`.
# cancel-in-progress: false means queue, don't abort — we want both
# releases, just one after the other.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # =================================================================
  # == Parse the PR's release label
  # == Expects exactly one of: major, minor, patch, no version
  # =================================================================
  Check-PR-Labels:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      RELEASE_TYPE: ${{ steps.labels.outputs.RELEASE_TYPE }}
    steps:
      - name: Parse PR labels
        id: labels
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS_JSON=$(gh api \
            "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels")
          echo "Labels on PR:"
          echo "$LABELS_JSON" | jq -r '.[].name'

          # Count matches and pick the one we found
          MATCHES=$(echo "$LABELS_JSON" | jq -r \
            '[.[] | select(.name == "major" or .name == "minor" or .name == "patch" or .name == "no version")] | length')
          TYPE=$(echo "$LABELS_JSON" | jq -r \
            '[.[] | select(.name == "major" or .name == "minor" or .name == "patch" or .name == "no version")][0].name // ""')

          if [[ "$MATCHES" -ne 1 ]]; then
            echo "::error::Expected exactly one of: major, minor, patch, 'no version'. Found $MATCHES."
            exit 1
          fi

          # Normalize "no version" -> "none" for downstream shell-safe checks
          if [[ "$TYPE" == "no version" ]]; then
            TYPE="none"
          fi

          echo "RELEASE_TYPE=$TYPE" >> "$GITHUB_OUTPUT"
          echo "Release type: $TYPE"

  # =================================================================
  # == Compute the next semver from the latest tag + the label
  # == Uses the semver npm package (same as internal
  # == common-github-actions/create_release) to avoid fragile bash
  # == arithmetic on version strings.
  # =================================================================
  Compute-Version:
    needs: Check-PR-Labels
    if: needs.Check-PR-Labels.outputs.RELEASE_TYPE != 'none'
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.bump.outputs.VERSION }}
    steps:
      - name: Install semver
        run: npm install semver

      - name: Compute next version
        id: bump
        uses: actions/github-script@v7
        env:
          RELEASE_TYPE: ${{ needs.Check-PR-Labels.outputs.RELEASE_TYPE }}
        with:
          script: |
            const semver = require('semver');
            const releaseType = process.env.RELEASE_TYPE;

            // Pull all tags, keep only valid semver ones.
            // semver.valid() rejects things like v1.2.3.4 or bare branches
            // that `git tag --list 'v*.*.*'` would otherwise match.
            const tags = await github.paginate(
              github.rest.repos.listTags,
              { owner: context.repo.owner, repo: context.repo.repo }
            );

            const semverTags = tags
              .map(t => t.name)
              .filter(name => semver.valid(name))
              .map(name => semver.parse(semver.clean(name)))
              .sort(semver.rcompare);

            const latest = semverTags.length > 0
              ? semverTags[0]
              : semver.parse('0.0.0');

            const next = semver.inc(latest, releaseType);
            if (!next) {
              core.setFailed(
                `Unable to compute next version (latest=${latest}, releaseType=${releaseType})`
              );
              return;
            }

            const tag = `v${next}`;
            core.info(`Latest semver tag: v${latest}`);
            core.info(`Next version: ${tag}`);
            core.setOutput('VERSION', tag);

  # =================================================================
  # == Build, test, and publish the release
  # =================================================================
  Release:
    needs: [Check-PR-Labels, Compute-Version]
    if: needs.Check-PR-Labels.outputs.RELEASE_TYPE != 'none'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

      - name: Build release archives
        run: make release VERSION=${{ needs.Compute-Version.outputs.VERSION }}

      - name: Create tag + GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.Compute-Version.outputs.VERSION }}"
          SHA="${{ github.event.pull_request.merge_commit_sha }}"

          gh release create "$VERSION" \
            --target "$SHA" \
            --title "$VERSION" \
            --generate-notes \
            dist/*.tar.gz \
            dist/*.zip \
            dist/checksums.txt
